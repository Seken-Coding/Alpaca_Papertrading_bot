# Multi-Account Strategy Configuration
#
# Each account runs in its own process with isolated data/logs directories.
# API keys are referenced by environment variable name — actual secrets
# stay in .env (never committed to version control).
#
# bot_type: "intraday" (main.py strategies) or "cest" (cest_main.py CEST strategy)
# strategy_overrides: keys matching Settings fields (intraday) or CestConfig fields (cest)

accounts:
  - id: "momentum_aggressive"
    label: "Momentum - Aggressive"
    bot_type: "intraday"
    api_key_env: "ACCT1_API_KEY"
    secret_key_env: "ACCT1_SECRET_KEY"
    paper: true
    strategy_overrides:
      scan_interval_min: 5
      max_orders_per_scan: 8
      trailing_stop_pct: 1.5

  - id: "cest_conservative"
    label: "CEST - Conservative"
    bot_type: "cest"
    api_key_env: "ACCT2_API_KEY"
    secret_key_env: "ACCT2_SECRET_KEY"
    paper: true
    strategy_overrides:
      RISK_PER_TRADE: 0.005
      MAX_POSITIONS: 6
      TREND_STOP_ATR_MULT: 2.5
      MIN_CONFLUENCE_SCORE: 6

  - id: "cest_aggressive"
    label: "CEST - Aggressive Pyramiding"
    bot_type: "cest"
    api_key_env: "ACCT3_API_KEY"
    secret_key_env: "ACCT3_SECRET_KEY"
    paper: true
    strategy_overrides:
      RISK_PER_TRADE: 0.015
      MAX_POSITIONS: 12
      PYRAMIDING_ENABLED: true
      MAX_PYRAMID_ADDS: 3

# Promotion criteria — used by the dashboard and promotion report
promotion:
  min_trading_days: 30
  min_total_trades: 20
  ranking_weights:
    sharpe_ratio: 0.30
    total_return_pct: 0.25
    max_drawdown_pct: 0.20
    profit_factor: 0.15
    win_rate: 0.10
